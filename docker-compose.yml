services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - larvis_chroma:/data

  larvis:
    build: .
    ports:
      - "8765:8765"
    env_file: .env
    environment:
      # Reach native Mac Ollama (Metal GPU) from inside the container
      OLLAMA_HOST: http://host.docker.internal:11434
      CHROMA_HOST: http://chromadb:8000
      VAULT_PATH: /vault
      LINEAR_API_KEY: ${LINEAR_API_KEY}
      LB_TEAM_KEY: ${LB_TEAM_KEY:-PHA}
      YNAB_API_KEY: ${YNAB_API_KEY}
      YNAB_BUDGET_ID: ${YNAB_BUDGET_ID:-last-used}
      GCAL_CALENDAR_IDS: ${GCAL_CALENDAR_IDS:-primary}
      GCAL_WORK_START: ${GCAL_WORK_START:-09:00}
      GCAL_WORK_END: ${GCAL_WORK_END:-17:00}
      GMAIL_ACCOUNTS: ${GMAIL_ACCOUNTS:-primary}
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-.gmail/credentials.json}
      GMAIL_TOKEN_DIR: ${GMAIL_TOKEN_DIR:-.gmail}
      GMAIL_TRIAGE_QUERY: ${GMAIL_TRIAGE_QUERY:-is:unread newer_than:2d}
      GMAIL_MAX_MESSAGES: ${GMAIL_MAX_MESSAGES:-40}
      GMAIL_BODY_CHARS: ${GMAIL_BODY_CHARS:-2000}
      SKYLIGHT_FRAME_ID: ${SKYLIGHT_FRAME_ID:-}
      SKYLIGHT_TOKEN_PATH: ${SKYLIGHT_TOKEN_PATH:-.skylight/token.json}
      SKYLIGHT_BASE_URL: ${SKYLIGHT_BASE_URL:-https://app.ourskylight.com}
    volumes:
      - ${VAULT_PATH}:/vault:ro
      - ./.memory:/app/.memory
      - ./.ynab:/app/.ynab
      - ./.gcal:/app/.gcal
      - ./.gmail:/app/.gmail
      - ./.skylight:/app/.skylight
    depends_on:
      - chromadb

volumes:
  larvis_chroma:
