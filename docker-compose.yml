services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - larvis_chroma:/data

  larvis:
    build: .
    ports:
      - "8765:8765"
    env_file: .env
    environment:
      # Reach native Mac Ollama (Metal GPU) from inside the container
      OLLAMA_HOST: http://host.docker.internal:11434
      CHROMA_HOST: http://chromadb:8000
      VAULT_PATH: /vault
      LINEAR_API_KEY: ${LINEAR_API_KEY}
      LB_TEAM_KEY: ${LB_TEAM_KEY:-PHA}
      YNAB_API_KEY: ${YNAB_API_KEY}
      YNAB_BUDGET_ID: ${YNAB_BUDGET_ID:-last-used}
    volumes:
      - ${VAULT_PATH}:/vault:ro
      - ./.memory:/app/.memory
      - ./.ynab:/app/.ynab
    depends_on:
      - chromadb

volumes:
  larvis_chroma:
